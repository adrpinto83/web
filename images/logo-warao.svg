<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="palmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="url(#waterGradient)" opacity="0.1"/>

  <!-- Canoa (elemento central de la cultura Warao) -->
  <path d="M 30 120 Q 100 110 170 120 L 165 130 Q 100 125 35 130 Z"
        fill="#8d6e63" stroke="#5d4037" stroke-width="2"/>

  <!-- Palma de Moriche estilizada -->
  <g transform="translate(100, 50)">
    <!-- Tronco -->
    <rect x="-4" y="20" width="8" height="50" fill="url(#palmGradient)" rx="2"/>

    <!-- Hojas -->
    <path d="M 0 20 Q -25 0 -35 -5 Q -25 5 0 25" fill="#66bb6a" opacity="0.8"/>
    <path d="M 0 20 Q -15 -5 -20 -15 Q -10 -5 0 25" fill="#81c784" opacity="0.9"/>
    <path d="M 0 20 Q 0 -10 0 -20 Q 0 -5 0 25" fill="#66bb6a"/>
    <path d="M 0 20 Q 15 -5 20 -15 Q 10 -5 0 25" fill="#81c784" opacity="0.9"/>
    <path d="M 0 20 Q 25 0 35 -5 Q 25 5 0 25" fill="#66bb6a" opacity="0.8"/>
  </g>

  <!-- Olas del Delta -->
  <path d="M 20 145 Q 35 140 50 145 T 80 145 T 110 145 T 140 145 T 170 145 T 200 145"
        stroke="#1e88e5" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 20 155 Q 35 150 50 155 T 80 155 T 110 155 T 140 155 T 170 155 T 200 155"
        stroke="#1e88e5" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Texto -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle" fill="#0d47a1">Delta Amacuro</text>
</svg>
