<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="waterDeep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.9" />
    </linearGradient>
    <radialGradient id="fishOrange">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef6c00;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="fishSilver">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9e9e9e;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="fishGreen">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Agua -->
  <rect width="600" height="400" fill="url(#waterDeep)"/>

  <!-- Rayos de sol desde arriba -->
  <g opacity="0.2">
    <path d="M 100 0 L 120 400" stroke="#fff" stroke-width="30" fill="none"/>
    <path d="M 250 0 L 270 400" stroke="#fff" stroke-width="40" fill="none"/>
    <path d="M 400 0 L 420 400" stroke="#fff" stroke-width="35" fill="none"/>
  </g>

  <!-- Burbujas -->
  <circle cx="150" cy="100" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="160" cy="85" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="155" cy="70" r="4" fill="#fff" opacity="0.4"/>

  <circle cx="450" cy="150" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="460" cy="135" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="455" cy="115" r="3" fill="#fff" opacity="0.5"/>

  <!-- Plantas acuáticas -->
  <g opacity="0.6">
    <path d="M 50 400 Q 45 350, 50 300 Q 55 250, 50 200"
          stroke="#2e7d32" stroke-width="8" fill="none"/>
    <ellipse cx="50" cy="200" rx="15" ry="25" fill="#43a047" transform="rotate(-20 50 200)"/>
    <ellipse cx="48" cy="240" rx="12" ry="20" fill="#43a047" transform="rotate(15 48 240)"/>

    <path d="M 550 400 Q 545 340, 550 280 Q 555 230, 550 180"
          stroke="#2e7d32" stroke-width="8" fill="none"/>
    <ellipse cx="550" cy="180" rx="15" ry="25" fill="#43a047" transform="rotate(20 550 180)"/>
    <ellipse cx="552" cy="220" rx="12" ry="20" fill="#43a047" transform="rotate(-15 552 220)"/>
  </g>

  <!-- Pez 1 (Cachama - naranja grande) -->
  <g id="fish1" transform="translate(300, 150)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="60" ry="40" fill="url(#fishOrange)"/>

    <!-- Cola -->
    <path d="M -60 0 L -90 -20 L -85 0 L -90 20 Z" fill="#ff9800"/>

    <!-- Aletas -->
    <ellipse cx="10" cy="-35" rx="15" ry="20" fill="#ffa726" transform="rotate(-30 10 -35)"/>
    <ellipse cx="-20" cy="25" rx="20" ry="12" fill="#fb8c00" transform="rotate(20 -20 25)"/>
    <ellipse cx="20" cy="25" rx="18" ry="12" fill="#fb8c00" transform="rotate(-20 20 25)"/>

    <!-- Ojo -->
    <circle cx="45" cy="-8" r="8" fill="#fff"/>
    <circle cx="46" cy="-8" r="5" fill="#000"/>
    <circle cx="47" cy="-9" r="2" fill="#fff"/>

    <!-- Escamas (textura) -->
    <g opacity="0.3">
      <circle cx="10" cy="-10" r="8" fill="none" stroke="#ef6c00" stroke-width="1"/>
      <circle cx="10" cy="5" r="8" fill="none" stroke="#ef6c00" stroke-width="1"/>
      <circle cx="-10" cy="-8" r="8" fill="none" stroke="#ef6c00" stroke-width="1"/>
      <circle cx="-10" cy="8" r="8" fill="none" stroke="#ef6c00" stroke-width="1"/>
      <circle cx="-30" cy="0" r="8" fill="none" stroke="#ef6c00" stroke-width="1"/>
    </g>

    <!-- Boca -->
    <ellipse cx="58" cy="2" rx="6" ry="4" fill="#d84315"/>
  </g>

  <!-- Pez 2 (Plateado - pequeño izquierda) -->
  <g id="fish2" transform="translate(150, 250)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="url(#fishSilver)"/>

    <!-- Cola -->
    <path d="M 35 0 L 55 -10 L 52 0 L 55 10 Z" fill="#bdbdbd"/>

    <!-- Aletas -->
    <ellipse cx="-5" cy="-18" rx="10" ry="12" fill="#d0d0d0" transform="rotate(-40 -5 -18)"/>
    <ellipse cx="10" cy="15" rx="12" ry="8" fill="#c0c0c0" transform="rotate(25 10 15)"/>

    <!-- Ojo -->
    <circle cx="-25" cy="-5" r="5" fill="#fff"/>
    <circle cx="-25" cy="-5" r="3" fill="#000"/>
    <circle cx="-24" cy="-6" r="1.5" fill="#fff"/>

    <!-- Línea lateral -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#757575" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Pez 3 (Plateado - pequeño izquierda arriba) -->
  <g id="fish3" transform="translate(180, 200)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="url(#fishSilver)"/>

    <!-- Cola -->
    <path d="M 30 0 L 48 -8 L 46 0 L 48 8 Z" fill="#bdbdbd"/>

    <!-- Aletas -->
    <ellipse cx="-4" cy="-16" rx="8" ry="10" fill="#d0d0d0" transform="rotate(-40 -4 -16)"/>
    <ellipse cx="8" cy="13" rx="10" ry="7" fill="#c0c0c0" transform="rotate(25 8 13)"/>

    <!-- Ojo -->
    <circle cx="-22" cy="-4" r="4" fill="#fff"/>
    <circle cx="-22" cy="-4" r="2.5" fill="#000"/>
  </g>

  <!-- Pez 4 (Verde - mediano derecha) -->
  <g id="fish4" transform="translate(450, 280) scale(-1, 1)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="45" ry="28" fill="url(#fishGreen)"/>

    <!-- Cola -->
    <path d="M -45 0 L -65 -12 L -62 0 L -65 12 Z" fill="#43a047"/>

    <!-- Aletas -->
    <ellipse cx="5" cy="-25" rx="12" ry="15" fill="#66bb6a" transform="rotate(-35 5 -25)"/>
    <ellipse cx="-15" cy="20" rx="15" ry="10" fill="#4caf50" transform="rotate(20 -15 20)"/>
    <ellipse cx="15" cy="20" rx="13" ry="10" fill="#4caf50" transform="rotate(-20 15 20)"/>

    <!-- Ojo -->
    <circle cx="35" cy="-6" r="6" fill="#fff"/>
    <circle cx="35" cy="-6" r="4" fill="#000"/>
    <circle cx="36" cy="-7" r="1.5" fill="#fff"/>

    <!-- Escamas -->
    <g opacity="0.3">
      <circle cx="5" cy="-8" r="7" fill="none" stroke="#2e7d32" stroke-width="1"/>
      <circle cx="5" cy="5" r="7" fill="none" stroke="#2e7d32" stroke-width="1"/>
      <circle cx="-15" cy="0" r="7" fill="none" stroke="#2e7d32" stroke-width="1"/>
    </g>
  </g>

  <!-- Pez 5 (Pequeño verde arriba derecha) -->
  <g id="fish5" transform="translate(400, 120) scale(-1, 1)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="28" ry="16" fill="url(#fishGreen)"/>

    <!-- Cola -->
    <path d="M -28 0 L -42 -8 L -40 0 L -42 8 Z" fill="#43a047"/>

    <!-- Aletas -->
    <ellipse cx="3" cy="-14" rx="8" ry="10" fill="#66bb6a" transform="rotate(-40 3 -14)"/>
    <ellipse cx="8" cy="12" rx="9" ry="6" fill="#4caf50" transform="rotate(25 8 12)"/>

    <!-- Ojo -->
    <circle cx="20" cy="-4" r="4" fill="#fff"/>
    <circle cx="20" cy="-4" r="2.5" fill="#000"/>
  </g>

  <!-- Pez 6 (Naranja pequeño abajo) -->
  <g id="fish6" transform="translate(250, 320) scale(-1, 1)">
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="32" ry="20" fill="url(#fishOrange)"/>

    <!-- Cola -->
    <path d="M -32 0 L -48 -9 L -46 0 L -48 9 Z" fill="#ff9800"/>

    <!-- Aletas -->
    <ellipse cx="4" cy="-17" rx="9" ry="12" fill="#ffa726" transform="rotate(-35 4 -17)"/>
    <ellipse cx="10" cy="14" rx="11" ry="7" fill="#fb8c00" transform="rotate(20 10 14)"/>

    <!-- Ojo -->
    <circle cx="24" cy="-5" r="5" fill="#fff"/>
    <circle cx="24" cy="-5" r="3" fill="#000"/>
  </g>

  <!-- Más burbujas -->
  <circle cx="300" cy="320" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="310" cy="305" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="305" cy="290" r="5" fill="#fff" opacity="0.3"/>

  <!-- Texto -->
  <text x="300" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        text-anchor="middle" fill="#fff" stroke="#1565c0" stroke-width="2">Peces del Orinoco</text>
  <text x="300" y="60" font-family="Arial, sans-serif" font-size="15"
        text-anchor="middle" fill="#e3f2fd">Cachama, Coporo, Palometa y más</text>
</svg>
